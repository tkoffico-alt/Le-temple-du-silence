<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemin AYP - Le Temple du Silence</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0f172a;
            --accent-blue: #2563eb;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Georgia', serif;
            color: #f0f0f0;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1506126613408-eca07ce68773?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Barre de Navigation style "Chemin AYP" */
        nav {
            background: rgba(15, 23, 42, 0.9);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--gold);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            color: var(--gold);
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-links button {
            background: transparent;
            border: none;
            color: #cbd5e1;
            margin-left: 1.5rem;
            cursor: pointer;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .nav-links button:hover {
            color: var(--gold);
        }

        .active-link {
            border-bottom: 2px solid var(--gold) !important;
            color: white !important;
        }

        /* Conteneur Principal */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 2rem;
        }

        .card {
            background: rgba(15, 23, 42, 0.85);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 800px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 1.5rem;
            font-style: italic;
            background: linear-gradient(to right, #fff, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section { display: none; }
        .section.active { display: block; }

        /* Style des boutons d'action */
        .cta-button {
            background: var(--accent-blue);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            margin: 20px 0;
            transition: transform 0.3s, background 0.3s;
        }

        .cta-button:hover {
            transform: scale(1.05);
            background: #1d4ed8;
        }

        #response-area {
            margin-top: 2rem;
            font-size: 1.3rem;
            line-height: 1.8;
            color: #e2e8f0;
            font-style: italic;
        }

        .media-placeholder {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            border: 1px dashed var(--gold);
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CHEMIN AYP</div>
        <div class="nav-links">
            <button onclick="showSection('sage')" id="btn-sage" class="active-link">LE SAGE AYP</button>
            <button onclick="showSection('parabole')" id="btn-parabole">LA PARABOLE</button>
            <button onclick="showSection('podcasts')" id="btn-podcasts">PODCASTS & VIDÉOS</button>
        </div>
    </nav>

    <div class="main-container">
        <div class="card">
            
            <div id="sage" class="section active">
    <h1>Le Temple du Silence</h1>
    <p>Confiez votre interrogation à l'Instructeur...</p>
    
    <input type="text" id="user-question" placeholder="Votre question ici..." 
           style="width: 80%; padding: 15px; border-radius: 10px; border: 1px solid var(--gold); background: rgba(255,255,255,0.1); color: white; margin-bottom: 20px; font-family: 'Georgia', serif;">
    
    <br>
    <button class="cta-button" onclick="askSage()">Interroger le Sage</button>
    <div id="response-area">Présence simple, l'âme accueille.</div>
</div>

            <div id="parabole" class="section">
                <h1>La Parabole</h1>
                <div id="text-content" style="text-align: left;">
                    <p>"Kofi cherchait la paix Hors de lui..."</p>
                    </div>
            </div>

            <div id="podcasts" class="section">
                <h1>Méditations & Visions</h1>
                <div class="media-placeholder">
                    <p>🎙️ Podcast : Le Silence de la Rivière</p>
                    <audio controls style="width: 100%;">
                        <source src="votre-lien-audio.mp3" type="audio/mpeg">
                    </audio>
                </div>
                <div class="media-placeholder">
                    <p>🎥 Vidéo : Pratiques Avancées</p>
                    <div style="background: #000; height: 200px; display: flex; align-items: center; justify-content: center;">
                        Contenu Vidéo à venir
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function showSection(id) {
            // Gère le passage entre Le Sage, La Parabole et les Podcasts
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active-link'));
            
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active-link');
        }

        async function askSage() {
        const questionInput = document.getElementById('user-question');
        const userPrompt = questionInput.value || "Donne-moi une guidance générale."; 
        
        const responseDiv = document.getElementById('response-area');
        responseDiv.innerHTML = "L'Instructeur AYP médite sur votre question...";
        
        const promptInstruction = "Tu es l'Instructeur AYP. Ton enseignement repose exclusivement sur la méthode de Yogani (Advanced Yoga Practices). Évite absolument tout concept flou ou 'New Age' superficiel. Reste technique, sobre et profond, en t'appuyant sur la science de l'auto-rythme et l'équilibre intérieur. Réponds avec une poésie concise à : " + userPrompt;

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptInstruction })
                });
                const data = await res.json();
                responseDiv.innerHTML = data.text;
            } catch (error) {
                responseDiv.innerHTML = "Le lien est rompu : " + error.message;
            }
        }
    </script>
</body>
</html>
