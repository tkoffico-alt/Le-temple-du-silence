<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Temple du Silence</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Lora:ital,wght@0,400;0,600;1,400&family=Yatra+One&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>Le Temple du Silence</h1>
        <div class="subtitle-container">
            <p class="site-subtitle">CHEMIN AYP</p>
            <img src="signature-ayp.png" alt="Signature Lignée" class="header-signature">
        </div>
        
        <div class="controls">
            <button id="lang-toggle" onclick="toggleLang()">English</button>
            <button id="theme-toggle" onclick="toggleTheme()">Clarté</button>
        </div>
        
        <nav>
            <button id="nav-sage" class="active" onclick="showSection('sage')">
                <span class="fr">Le Sage</span>
                <span class="en" style="display:none;">The Sage</span>
            </button>
            <button id="nav-enseignements" onclick="showSection('enseignements')">
                <span class="fr">Enseignements</span>
                <span class="en" style="display:none;">Teachings</span>
            </button>
            <button id="nav-murmures" onclick="showSection('murmures')">
                <span class="fr">Murmures</span>
                <span class="en" style="display:none;">Whispers</span>
            </button>
            <button id="nav-parabole" onclick="showSection('parabole')">
                <span class="fr">La Parabole</span>
                <span class="en" style="display:none;">The Parable</span>
            </button>
        </nav>
    </header>

    <main>
        <section id="sage" class="section active">
            <div id="chat-container">
                <div id="chat-log"></div>
                <div class="input-area">
                    <input type="text" id="sage-input" placeholder="Posez votre question à l'Univers...">
                    <button id="sage-btn" onclick="askSage()">
                        <span class="fr">Interroger</span>
                        <span class="en" style="display:none;">Ask</span>
                    </button>
                </div>
            </div>
            
            <div style="display: flex; justify-content: flex-end; align-items: center; margin-top: 20px; opacity: 0.85;">
                <span class="fr" style="font-style: italic; font-size: 1rem; color: var(--accent-color); margin-right: 15px;">Œuvre Originale & Propriété de la Lignée</span>
                <span class="en" style="display:none; font-style: italic; font-size: 1rem; color: var(--accent-color); margin-right: 15px;">Original Work & Lineage Property</span>
                <img src="signature-ayp.png" alt="Signature Lignée" style="height: 45px; filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.5));">
            </div>

            <audio id="sage-resonance" src="resonance.mp3" loop></audio>
        </section>

        <section id="enseignements" class="section">
            <div id="enseignements-container" class="parchment-text"></div>
        </section>

        <section id="murmures" class="section">
            <div id="murmures-list-container"></div>
        </section>

        <section id="parabole" class="section">
            <div class="teaching-article parchment-text">
                <h2 id="parabole-title" style="text-align:center;"></h2>
                
                <div style="text-align: center; margin-bottom: 30px;">
                    <video id="parabole-video" controls style="width: 100%; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: none;">
                        <source src="" type="video/mp4">
                        Votre navigateur ne supporte pas la vidéo.
                    </video>
                </div>
                
                <div style="text-align: center; margin-bottom: 30px;">
                    <audio id="parabole-audio" controls style="width: 100%; display: none;">
                        <source src="" type="audio/mpeg">
                        Votre navigateur ne supporte pas l'audio.
                    </audio>
                </div>

                <div id="parabole-text"></div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Le Temple du Silence. <span class="en" style="display:none;">All rights reserved.</span><span class="fr">Tous droits réservés.</span></p>
    </footer>

    <script src="contenu.js"></script>

    <script>
    let currentLang = 'fr';
    let isTyping = false;
    let isFirstQuestion = true; 

    const PARABOLE_DATA = {
        fr: {
            title: "Le Gardien du Silence",
            text: "<p>Il était une fois, dans une vallée oubliée par le tumulte du monde, un Gardien qui veillait sur une source intarissable. Ce n'était pas une source d'eau, mais une source de silence. Ceux qui s'y abreuvaient ne gagnaient ni pouvoirs extraordinaires ni réponses magiques, ils trouvaient simplement l'apaisement de leur propre esprit.</p><p>Le Gardien ne parlait jamais le premier. Il attendait que le voyageur pose sa question, non pas pour lui dicter une vérité, mais pour lui renvoyer la sagesse qui sommeillait déjà en lui.</p>"
        },
        en: {
            title: "The Guardian of Silence",
            text: "<p>Once upon a time, in a valley forgotten by the tumult of the world, a Guardian watched over an inexhaustible spring. It was not a spring of water, but a spring of silence. Those who drank from it gained neither extraordinary powers nor magical answers; they simply found the pacification of their own minds.</p><p>The Guardian never spoke first. He waited for the traveler to ask their question, not to dictate a truth, but to reflect the wisdom that already slumbered within them.</p>"
        }
    };

    // Fonction Bouton Unique de Langue
    function toggleLang() {
        if (currentLang === 'fr') {
            switchLang('en');
            document.getElementById('lang-toggle').innerText = 'Français';
        } else {
            switchLang('fr');
            document.getElementById('lang-toggle').innerText = 'English';
        }
    }

    function switchLang(lang) {
        currentLang = lang;

        document.querySelectorAll('.fr').forEach(el => el.style.display = lang === 'fr' ? 'inline' : 'none');
        document.querySelectorAll('.en').forEach(el => el.style.display = lang === 'en' ? 'inline' : 'none');

        const inputPlaceholder = lang === 'fr' ? "Posez votre question à l'Univers..." : "Ask your question to the Universe...";
        document.getElementById('sage-input').placeholder = inputPlaceholder;

        // Mise à jour du bouton thème selon la langue
        const themeBtn = document.getElementById('theme-toggle');
        const isLight = document.body.classList.contains('light-mode');
        if (lang === 'fr') {
            themeBtn.innerText = isLight ? 'Obscurité' : 'Clarté';
        } else {
            themeBtn.innerText = isLight ? 'Darkness' : 'Light';
        }

        renderEnseignements();
        renderMurmures();
        renderParabole();
    }

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('theme-toggle');
        body.classList.toggle('light-mode');
        
        if (body.classList.contains('light-mode')) {
            btn.innerText = currentLang === 'fr' ? 'Obscurité' : 'Darkness';
        } else {
            btn.innerText = currentLang === 'fr' ? 'Clarté' : 'Light';
        }
    }

    function showSection(sectionId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active');

        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(`nav-${sectionId}`).classList.add('active');
    }

    /* Fonction qui génère la signature automatiquement pour les textes */
    function getSignatureHTML() {
        const signatureText = currentLang === 'fr' ? "Œuvre Originale & Propriété de la Lignée" : "Original Work & Lineage Property";
        return `
            <div style="display: flex; justify-content: flex-end; align-items: center; margin-top: 40px; opacity: 0.85;">
                <span style="font-style: italic; font-size: 1rem; color: var(--accent-color); margin-right: 15px;">${signatureText}</span>
                <img src="signature-ayp.png" alt="Signature Lignée" style="height: 45px; filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.5));">
            </div>
        `;
    }

    function renderEnseignements() {
        const container = document.getElementById("enseignements-container");
        container.innerHTML = ""; 
        const currentData = TEACHINGS_DATABASE[currentLang];

        if (currentData.length === 0) {
            container.innerHTML = `<p style="font-style:italic; opacity:0.7; text-align:center;">${currentLang === 'fr' ? "Bientôt disponible." : "Coming soon."}</p>`;
            return;
        }

        currentData.forEach((item) => {
            const article = document.createElement("div");
            article.className = "teaching-article";
            article.innerHTML = `<h2>${item.title}</h2>${item.body}` + getSignatureHTML();
            container.appendChild(article);
        });
    }

    function renderMurmures() {
        const container = document.getElementById("murmures-list-container");
        container.innerHTML = ""; 
        const currentMurmures = MURMURES_DATABASE[currentLang];

        if (currentMurmures.length === 0) {
            container.innerHTML = `<p style="font-style:italic; opacity:0.7; text-align:center;">${currentLang === 'fr' ? "Bientôt disponible." : "Coming soon."}</p>`;
            return;
        }

        currentMurmures.forEach((murmure, index) => {
            let mediaHTML = "";
            let downloadBtnHTML = ""; 
            
            if (murmure.videoFile && murmure.videoFile !== "") {
                mediaHTML = `<video controls src="${murmure.videoFile}" style="width: 100%; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);"></video>`;
                let downloadText = currentLang === 'fr' ? "Télécharger la vidéo" : "Download video";
                downloadBtnHTML = `<a href="${murmure.videoFile}" download class="zen-btn" style="font-size: 0.8rem; opacity: 0.7; text-decoration: none; padding: 5px 10px;">📥 ${downloadText}</a>`;
            } 
            else {
                if (murmure.imageFile && murmure.imageFile !== "") {
                    mediaHTML += `<img src="${murmure.imageFile}" alt="Illustration" style="width: 100%; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">`;
                }
                if (murmure.audioFile && murmure.audioFile !== "") {
                    mediaHTML += `<audio controls src="${murmure.audioFile}" style="width: 100%; margin-bottom: 15px;"></audio>`;
                }
            }

            let shareText = currentLang === 'fr' ? "Partager le texte" : "Share text";

            const murmureHTML = `
                <div class="murmure-item">
                    <h2 style="text-align: center; border:none;">${index + 1}. ${murmure.title}</h2>
                    ${mediaHTML}
                    <div id="texte-murmure-${index}">${murmure.text}</div>
                    ${getSignatureHTML()} 
                    <div style="display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 25px;">
                        <button class="zen-btn" style="font-size: 0.8rem; opacity: 0.7; margin: 0; padding: 5px 10px;" onclick="partagerMurmure(${index})">
                            ✨ ${shareText}
                        </button>
                        ${downloadBtnHTML}
                    </div>
                </div>
            `;
            container.innerHTML += murmureHTML;
        });
    }

    function renderParabole() {
        document.getElementById("parabole-title").innerText = PARABOLE_DATA[currentLang].title;
        // On injecte le texte de la parabole + la signature
        document.getElementById("parabole-text").innerHTML = PARABOLE_DATA[currentLang].text + getSignatureHTML();
    }

    function partagerMurmure(index) {
        let tempDiv = document.createElement("div");
        tempDiv.innerHTML = document.getElementById(`texte-murmure-${index}`).innerHTML.replace(/<br>/g, '\n');
        const texteBrut = tempDiv.innerText || tempDiv.textContent;
        
        const titre = MURMURES_DATABASE[currentLang][index].title;
        const lienSite = window.location.href.split('#')[0]; 
        
        const texteAPartager = `✨ ${titre} ✨\n\n"${texteBrut}"\n\nDécouvert sur : ${lienSite}`;

        if (navigator.share) {
            navigator.share({
                title: titre,
                text: texteAPartager,
            }).catch(console.error);
        } else {
            navigator.clipboard.writeText(texteAPartager).then(() => {
                const msg = currentLang === 'fr' ? "Texte copié dans le presse-papiers !" : "Text copied to clipboard!";
                alert(msg);
            });
        }
    }

    /* Le Cerveau du Sage */

        audioResonance.play();

        } else if (q.includes("amour divin") || q.includes("compassion") || q.includes("karuna") || q.includes("divine love")) {
            topic = "amour_divin";
        } else if (q.includes("secret") || q.includes("caché") || q.includes("cache") || q.includes("divulguer") || q.includes("hidden")) {
            topic = "secret";
        } else if (q.includes("granthi") || q.includes("nœud") || q.includes("noeud") || q.includes("brahma") || q.includes("vishnu") || q.includes("rudra") || q.includes("knot")) {
            topic = "granthis";
        } else if (q.includes("histoire") || q.includes("occident") || q.includes("vivekananda") || q.includes("yogananda") || q.includes("maharishi") || q.includes("history") || q.includes("west")) {
            topic = "histoire_yoga";
        }

        const data = sageBrain[currentLang][topic];
        let randomCore = data.core[Math.floor(Math.random() * data.core.length)];
        let randomScience = data.science[Math.floor(Math.random() * data.science.length)];
        let randomPacing = data.pacing[Math.floor(Math.random() * data.pacing.length)];

        let prefixFr = isFirstQuestion ? "Bienvenue, voyageur...\n\n" : "Voici ce qui émerge du silence...\n\n";
        let prefixEn = isFirstQuestion ? "Welcome, traveler...\n\n" : "Here is what emerges from the silence...\n\n";
        let prefix = currentLang === 'fr' ? prefixFr : prefixEn;
        
        isFirstQuestion = false;

        let finalResponse = `« ${prefix}${randomCore}\n\n${randomScience}\n\n${randomPacing} »`;

        typeWriter(finalResponse, 0, logEl, () => {
            isTyping = false;
            // Extinction du son (doucement)
            let fadeAudioOut = setInterval(() => {
                if (audioResonance.volume > 0.01) {
                    audioResonance.volume -= 0.01;
                } else {
                    audioResonance.pause();
                    clearInterval(fadeAudioOut);
                }
            }, 100);
        });
    }

    function typeWriter(text, i, el, callback) {
        if (i < text.length) {
            el.innerHTML += text.charAt(i);
            setTimeout(() => typeWriter(text, i + 1, el, callback), 25);
        } else {
            callback();
        }
    }

    /* Initialisation */
    window.onload = () => {
        renderEnseignements();
        renderMurmures();
        renderParabole();
    };
    </script>
</body>
</html>
