<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Temple du Silence</title>
    <style>
        /* --- Styles de Beauté & Image de Fond --- */
        body { 
            background: #0a0a0c url('votre-image-kofi.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #ffffff; 
            font-family: 'Georgia', serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
        }

        /* Voile sombre pour la lisibilité */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        nav { 
            background: rgba(0,0,0,0.8); 
            padding: 20px; 
            text-align: right; 
            border-bottom: 1px solid #333;
        }

        nav a { 
            color: #ffffff; 
            text-decoration: none; 
            margin: 0 15px; 
            font-size: 0.9rem; 
            letter-spacing: 1px;
        }

        .container { 
            max-width: 800px; 
            margin: 60px auto; 
            padding: 40px; 
            background: rgba(20, 20, 25, 0.85); 
            border-radius: 15px; 
            border: 1px solid #d4af37; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 { color: #d4af37; font-size: 2.5rem; }
        
        #parable-body { 
            color: #ffffff !important; 
            text-align: justify; 
            line-height: 1.8; 
            font-size: 1.1rem;
            margin-top: 30px;
        }

        footer { 
            margin-top: auto; 
            padding: 40px; 
            text-align: center; 
            font-size: 0.8rem; 
            color: #d4af37;
        }

        .cta-button {
            background: #2b57e5;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <nav class="nav-links">
        <a href="#" id="btn-sage" onclick="showSection('sage')">LE SAGE AYP</a>
        <a href="#" id="btn-parabole" onclick="showSection('parabole')">LA PARABOLE</a>
        <button onclick="setLanguage('fr')" style="background:none; border:1px solid #333; color:white; cursor:pointer;">FR</button>
        <button onclick="setLanguage('en')" style="background:none; border:1px solid #333; color:white; cursor:pointer;">EN</button>
    </nav>

    <div class="container" id="sage">
        <h1>Le Temple du Silence</h1>
        <p>Confiez votre interrogation à l'Instructeur...</p>
        <input type="text" id="user-question" style="width:80%; padding:10px; background:#1a1a1e; border:1px solid #333; color:white;" placeholder="Votre question ici...">
        <br>
        <button class="cta-button">Interroger le Sage</button>
        <div id="response-area" style="margin-top:30px; font-style: italic;">Présence simple, l'âme accueille.</div>
    </div>

    <div class="container" id="parabole" style="display: none;">
        <h1 id="parable-main-title">La Parabole</h1>
        <h2 id="parable-title" style="color:#d4af37;">Au-delà de la Rive</h2>
        <audio id="audio-parabole" controls style="width:100%;">
            <source id="audio-source" src="parabole-fr.mp3" type="audio/mpeg">
        </audio>
        <div id="parable-body"></div>
        <p id="parable-footer" style="color: #d4af37; margin-top:30px;">Traversez. Écoutez. Pratiquez. Le reste suivra.</p>
    </div>

    <footer>
        <p>PROPRIÉTÉ & LIGNÉE 🪷 | PASSANTS : <span id="count">0000</span></p>
    </footer>

    <script>
    function showSection(sectionId) {
        document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
        const target = document.getElementById(sectionId);
        if (target) target.style.display = 'block';
    }

    function setLanguage(lang) {
        const isEn = lang === 'en';
        
        document.getElementById('btn-sage').textContent = isEn ? "THE SAGE AYP" : "LE SAGE AYP";
        document.getElementById('btn-parabole').textContent = isEn ? "THE PARABLE" : "LA PARABOLE";
        document.getElementById('parable-main-title').textContent = isEn ? "The Parable" : "La Parabole";
        document.getElementById('parable-title').textContent = isEn ? "Beyond the River" : "Au-delà de la Rive";

        const textKofi = isEn ? 
            `Beyond the River — A Parable on the Inner Call <br><br> There are places where no one dares to go anymore. Invisible borders, marked not by walls, but by ancient tales — tales of fear. <br><br> In a remote village, in the heart of the savanna, lived a young man named Kofi. He had neither the stature of warriors nor the prestige of elders. But he carried within him a question: what lies beyond what we think we know? <br><br> One day, this question took shape. The chief's daughter, Adwoa, was struck by a mysterious illness. The healer consulted the oracles, who pointed to a forgotten cure: a rare plant, hidden deep within the forest, on the other side of the sacred river. But this forest, the elders said, was haunted. <br><br> The chief promised wealth and honors. All refused. All, except Kofi. <br><br> He asked for nothing. Neither glory nor reward. What he heard within him was that profound silence that says: advance. He took a gourd of water and walked toward the river. There, he stopped. The water was a symbolic border. <br><br> He closed his eyes. Then, he crossed. <br><br> On the other side, the forest enveloped him. But he found only a presence. The earth was alive. Kofi met an old man sitting at the foot of an immense tree. <br><br> — Why do you come, walker? he asked. <br><br> Kofi told his story. The sage pointed to a plant: <br><br> — Here is what you seek. But remember: it is not the forest that devours souls. It is the uncontrolled desires of men. Those who come with a pure heart find nothing here but what they already carry within. <br><br> Kofi took the plant and left. Adwoa was healed. The village received a truth: <br><br> “Ears hear the fears of others, but only the eyes of the heart see the truth.” <br><br> Each of us is called to approach this inner river. To cross the border of inherited fears. The forest was never dangerous. What we seek is within us. <br><br> Cross. Listen. Practice. The rest will follow.` 
            : 
            `Au-delà de la Rivière — Une Parabole sur l’Appel Intérieur <br><br> Il y a des lieux où personne n’ose plus aller. Des frontières invisibles, marquées non par des murs, mais par des récits anciens — des récits de peur. <br><br> Dans un village reculé, au cœur de la savane, vivait un jeune homme nommé Kofi. Il n’avait ni la stature des guerriers, ni le prestige des anciens. Mais il portait en lui une question qui ne le quittait jamais : que se cache-t-il au-delà de ce que l’on croit savoir ? <br><br> Un jour, cette question prit chair. <br><br> La fille du chef, Adwoa, fut frappée d’un mal mystérieux. Le guérisseur consulta les oracles, qui désignèrent un remède oublié : une plante rare, cachée au plus profond de la forêt, de l’autre côté de la rivière sacrée. Mais cette forêt, disaient les anciens, était hantée. <br><br> Le chef promit richesses et honneurs. Tous refusèrent. Tous, sauf Kofi. <br><br> Il ne demandait rien. Ni gloire, ni récompense. Ce qu’il entendait en lui, c’était ce silence profond, qui ne marchande pas, mais qui dit simplement : avance. Il prit une gourde d’eau et marcha vers la rivière. Là, il s’arrêta. L’eau était une frontière symbolique. <br><br> Il ferma les yeux. Puis il traversa. <br><br> De l’autre côté, la forêt l’enveloppa. Mais il n’y trouva seulement une présence. La terre sous ses pas était vivante. Kofi rencontra un vieil homme, assis au pied d’un arbre immense. <br><br> — Pourquoi viens-tu, marcheur ? demanda-t-il. <br><br> Kofi raconta son histoire. Le sage montra une plante : <br><br> — Voici ce que tu cherches. Mais souviens-toi : ce n’est pas la forêt qui dévore les âmes. Ce sont les désirs non maîtrisés des hommes. Ceux qui viennent avec un cœur pur n’y trouvent rien d’autre que ce qu’ils portent déjà en eux. <br><br> Kofi repartit. Adwoa fut guérie. Le village reçut une vérité simple : <br><br> “Les oreilles entendent les peurs des autres, mais seuls les yeux du cœur voient la vérité.” <br><br> Chacun d’entre nous est appelé à s’approcher de cette rivière intérieure. À franchir la frontière des peurs héritées. La forêt n’a jamais été dangereuse. Ce que nous cherchons est en nous. <br><br> Traverse. Écoute. Pratique. Le reste suivra.`;
        
        document.getElementById('parable-body').innerHTML = textKofi;
    }

    function updateCounter() {
        let visits = localStorage.getItem('temple_visits') || 0;
        visits = parseInt(visits) + 1;
        localStorage.setItem('temple_visits', visits);
        document.getElementById('count').textContent = visits.toString().padStart(4, '0');
    }

    window.onload = function() {
        updateCounter();
        setLanguage('fr');
        showSection('sage');
    };
    </script>
</body>
</html>
