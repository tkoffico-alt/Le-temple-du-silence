<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Temple du Silence - AYP</title>
    <style>
        /* --- Esthétique & Immersion --- */
        body { 
            background: #0a0a0c url('kofi.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #ffffff; 
            font-family: 'Georgia', serif; 
            margin: 0;
            text-align: center;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); /* Voile protecteur pour la lisibilité */
            z-index: -1;
        }
        nav { background: rgba(0,0,0,0.85); padding: 20px; border-bottom: 1px solid #d4af37; display: flex; justify-content: space-between; align-items: center; }
        .nav-links a { color: #ffffff; text-decoration: none; margin: 0 15px; font-weight: bold; cursor: pointer; font-size: 0.9rem; letter-spacing: 1px; }
        .lang-btn { background: none; border: 1px solid #d4af37; color: #d4af37; cursor: pointer; padding: 5px 10px; margin-left: 5px; font-weight: bold; }
        
        .container { 
            max-width: 850px; 
            margin: 50px auto; 
            padding: 45px; 
            background: rgba(10, 10, 12, 0.88); 
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }
        
        h1, h2 { color: #d4af37; letter-spacing: 2px; }
        #parable-body { text-align: justify; line-height: 1.9; font-size: 1.15rem; color: #e0e0e0; }
        
        /* --- Le Bouton Bleu Interroger --- */
        #sage-btn {
            background: #2b57e5; 
            color: white;
            border: none;
            padding: 16px 45px;
            border-radius: 35px;
            cursor: pointer;
            margin-top: 25px;
            font-weight: bold;
            font-size: 1rem;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(43, 87, 229, 0.3);
            transition: all 0.3s ease;
        }
        #sage-btn:hover { background: #1a3fb5; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(43, 87, 229, 0.4); }
        
        input { width: 85%; padding: 15px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; font-size: 1rem; text-align: center; outline: none; }
        input:focus { border-color: #d4af37; }
        
        .signature-area { margin: 40px 0; }
        .signature-area img { width: 170px; filter: drop-shadow(0 0 8px #d4af37); }
        
        footer { padding: 40px; color: #d4af37; font-size: 0.85rem; letter-spacing: 2px; opacity: 0.8; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <span style="color:#d4af37; font-weight:bold; letter-spacing:3px; margin-left:20px;">CHEMIN AYP</span>
        <div class="nav-links">
            <a onclick="showSection('sage')" id="nav-sage">LE SAGE AYP</a>
            <a onclick="showSection('parabole')" id="nav-parabole">LA PARABOLE</a>
            <a onclick="showSection('podcasts')" id="nav-podcasts">PODCASTS & VIDÉOS</a>
            <button class="lang-btn" onclick="setLanguage('fr')">FR</button>
            <button class="lang-btn" onclick="setLanguage('en')">EN</button>
        </div>
    </nav>

    <div class="container" id="sage">
        <h1 id="sage-title">Le Temple du Silence</h1>
        <p id="sage-sub">Confiez votre interrogation à l'Instructeur...</p>
        <input type="text" id="user-question" placeholder="...">
        <br><button id="sage-btn" onclick="askSage()">INTERROGER</button>
        <div id="response-area" style="margin-top:40px; font-style:italic; color:#d4af37; font-size:1.25rem; min-height:80px; transition: opacity 0.5s;">Présence simple, l'âme accueille.</div>
    </div>

    <div class="container" id="parabole" style="display:none;">
        <h1 id="para-main-title">La Parabole</h1>
        <h2 id="para-title" style="font-style:italic;">Au-delà de la Rive</h2>
        <audio controls style="width:100%; margin:30px 0;"><source src="audio.mp3" type="audio/mpeg"></audio>
        <div id="parable-body"></div>
        <p id="para-quote" style="color:#d4af37; font-weight:bold; margin-top:30px; font-size:1.2rem;">Traversez. Écoutez. Pratiquez. Le reste suivra.</p>
    </div>

    <div class="container" id="podcasts" style="display:none;">
        <h1 id="pod-title">Autres Podcasts</h1>
        <div id="pod-content" style="text-align:left; line-height:2.5; font-size:1.1rem; padding-left:20px;"></div>
    </div>

    <div class="signature-area">
        <img src="signature-ayp.png" alt="Signature AYP">
    </div>

    <footer>
        <p id="footer-text">PROPRIÉTÉ & LIGNÉE 🪷 | PASSANTS : <span id="count">0000</span></p>
    </footer>

    <script>
    // --- L'Âme du Sage : Enseignements AYP & Poésie ---
    const wisdom = {
        fr: [
            "Le silence est la racine de toute chose. Ne laisse pas le vent des pensées l'agiter ; dépose simplement ton mantra dans la terre de ton être.",
            "La respiration spinale est le pont d'or reliant ta base au sommet de ton ciel intérieur. Respire comme le fleuve qui coule, sans effort.",
            "Sois le témoin immobile, celui qui regarde passer les nuages sans devenir le nuage. La paix est ta véritable nature.",
            "L'extase n'est pas une conquête, mais le parfum naturel d'un système nerveux que tu purifies, jour après jour, avec patience.",
            "Le mantra est une pirogue légère sur l'océan de l'esprit. Ne la surcharge pas avec le poids de la concentration forcée.",
            "La dévotion est le feu qui réchauffe le cœur. C'est elle qui transforme la technique en une rencontre vivante avec l'Infini.",
            "Pratique et lâche prise. Les fruits mûrissent à l'ombre de ton assise, pas dans le tumulte de tes attentes."
        ],
        en: [
            "Silence is the root of all things. Do not let the wind of thoughts stir it; simply plant your mantra in the earth of your being.",
            "Spinal breathing is the golden bridge connecting your base to the summit of your inner sky. Breathe like a flowing river, effortless.",
            "Be the still witness, the one who watches clouds pass without becoming the cloud. Peace is your true nature.",
            "Ecstasy is not a conquest, but the natural fragrance of a nervous system purified, day after day, with patience.",
            "The mantra is a light canoe on the ocean of the mind. Do not overload it with the weight of forced concentration.",
            "Devotion is the fire that warms the heart. It transforms technique into a living encounter with the Infinite.",
            "Practice and let go. The fruits ripen in the shade of your stillness, not in the noise of your expectations."
        ]
    };
    
    let currentLang = 'fr';

    function askSage() {
        const q = document.getElementById('user-question').value;
        const area = document.getElementById('response-area');
        if (!q.trim()) return;
        
        area.style.opacity = "0.3";
        area.innerHTML = currentLang === 'fr' ? "Le Sage écoute le silence..." : "The Sage listens to the silence...";
        
        setTimeout(() => {
            const list = wisdom[currentLang];
            const pick = list[Math.floor(Math.random() * list.length)];
            area.style.opacity = "1";
            area.innerHTML = `« ${pick} »`;
        }, 1200);
    }

    function showSection(id) {
        document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function setLanguage(lang) {
        currentLang = lang;
        const isEn = lang === 'en';
        
        // Navigation
        document.getElementById('nav-sage').textContent = isEn ? "THE SAGE AYP" : "LE SAGE AYP";
        document.getElementById('nav-parabole').textContent = isEn ? "THE PARABLE" : "LA PARABOLE";
        document.getElementById('nav-podcasts').textContent = isEn ? "PODCASTS & VIDEOS" : "PODCASTS & VIDÉOS";
        
        // Sage
        document.getElementById('sage-title').textContent = isEn ? "The Temple of Silence" : "Le Temple du Silence";
        document.getElementById('sage-sub').textContent = isEn ? "Entrust your question to the Instructor..." : "Confiez votre interrogation à l'Instructeur...";
        document.getElementById('sage-btn').textContent = isEn ? "ASK THE SAGE" : "INTERROGER";
        document.getElementById('response-area').innerHTML = isEn ? "Simple presence, the soul welcomes." : "Présence simple, l'âme accueille.";
        
        // --- LA PARABOLE INTÉGRALE ---
        const frText = `Il y a des lieux où personne n’ose plus aller. Des frontières invisibles, marquées non par des murs, mais par des récits anciens — des récits de peur.<br><br>Dans un village reculé, au cœur de la savane, vivait un jeune homme nommé Kofi. Il n’avait ni la stature des guerriers, ni le prestige des anciens. Mais il portait en lui une question qui ne le quittait jamais : que se cache-t-il au-delà de ce que l’on croit savoir ?<br><br>Un jour, cette question prit chair. La fille du chef fut frappée d’un mal mystérieux. Seul Kofi osa traverser la rivière sacrée vers la forêt interdite. Là-bas, il ne trouva ni démons, ni cris, mais un sanctuaire de paix. Un sage l'attendait sous un arbre immense.<br><br>Le vieil homme lui remit la plante guérisseuse en disant : "Ce n’est pas la forêt qui dévore les âmes, ce sont les désirs non maîtrisés. Les anciens ont semé la peur pour protéger ce lieu sacré de la convoitise. Seuls les cœurs purs voient la vérité."<br><br>Kofi guérit la jeune fille, et le village comprit : les oreilles entendent les peurs des autres, mais seuls les yeux du cœur voient la vérité. Traverse. Écoute. Pratique. Le reste suivra.`;
        
        const enText = `There are places where no one dares to go anymore. Invisible borders, marked not by walls, but by ancient tales — tales of fear.<br><br>In a remote village lived a young man named Kofi. He had neither the stature of warriors nor the prestige of elders. But he carried within him a question: what lies beyond what we think we know?<br><br>One day, this question took shape. The chief's daughter was struck by a mysterious illness. Only Kofi dared cross the sacred river into the forbidden forest. There, he found neither demons nor screams, but a sanctuary of peace. A sage was waiting for him under an immense tree.<br><br>The old man gave him the healing plant, saying: "It is not the forest that devours souls, but uncontrolled desires. The elders sowed fear to protect this sacred place from greed. Only pure hearts see the truth."<br><br>Kofi healed the girl, and the village understood: ears hear the fears of others, but only the eyes of the heart see the truth. Cross. Listen. Practice. The rest will follow.`;

        document.getElementById('parable-body').innerHTML = isEn ? enText : frText;
        document.getElementById('para-main-title').textContent = isEn ? "The Parable" : "La Parabole";
        document.getElementById('para-title').textContent = isEn ? "Beyond the River" : "Au-delà de la Rive";
        document.getElementById('para-quote').textContent = isEn ? "Cross. Listen. Practice. The rest will follow." : "Traversez. Écoutez. Pratiquez. Le reste suivra.";

        // Podcasts
        document.getElementById('pod-title').textContent = isEn ? "Other Podcasts" : "Autres Podcasts";
        document.getElementById('pod-content').innerHTML = isEn ? 
            "• The Foundation of Deep Meditation<br>• The Science of Spinal Breathing<br>• Samyama: Silence in Action" : 
            "• Les Fondations de la Méditation Profonde<br>• La Science de la Respiration Spinale<br>• Samyama : Le Silence en Action";
    }

    window.onload = function() {
        setLanguage('fr');
        showSection('sage');
        let count = localStorage.getItem('visits') || 1;
        localStorage.setItem('visits', ++count);
        document.getElementById('count').textContent = count.toString().padStart(4, '0');
    };
    </script>
</body>
</html>
