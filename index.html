<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Temple du Silence | Méditation Profonde</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* EMBELLISSEMENTS DEMANDÉS */
        :root {
            --title-blue: #5b8cba;
            --accent-color: #d4af37;
        }

        /* Application de la police Cinzel aux titres bleus et majuscules */
        .section-title, .content-title, .teaching-header-label, .accordion-title {
            font-family: 'Cinzel', serif !important;
            color: var(--title-blue) !important;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Le nouveau titre ENSEIGNEMENTS au-dessus des cartes */
        .teaching-header-label {
            display: block;
            text-align: center;
            font-size: 1.4rem;
            margin: 40px 0 20px 0;
            font-weight: 700;
            /* Ma suggestion d'expert : un léger éclat pour la profondeur */
            text-shadow: 0 0 10px rgba(91, 140, 186, 0.2);
        }

        /* Style des cartes pour la cohérence */
        .card-title {
            font-family: 'Cinzel', serif;
            color: var(--accent-color);
        }

        /* Masquage de la phrase supprimée dans Murmures (via CSS au cas où elle resterait en base) */
        .phrase-supprimee { display: none !important; }
    </style>
</head>
<body class="dark-mode">

    <nav class="navbar">
        <div class="nav-links">
            <a href="#enseignements" onclick="showSection('enseignements')">Enseignements</a>
            <a href="#pratiques" onclick="showSection('pratiques')">Pratiques</a>
            <a href="#bibliotheque" onclick="showSection('bibliotheque')">Bibliothèque</a>
            <a href="#murmures" onclick="showSection('murmures')">Murmures</a>
        </div>
    </nav>

    <div class="container">
        
        <section id="enseignements" class="section active">
            <h2 class="section-title">Enseignements</h2>
            
            <span class="teaching-header-label">ENSEIGNEMENTS</span>

            <div class="cards-container" id="enseignements-grid">
                </div>
        </section>

        <section id="pratiques" class="section">
            <h2 class="section-title">Pratiques</h2>
            <div id="manuel-container">
                </div>
        </section>

        <section id="bibliotheque" class="section">
            <h2 class="section-title">Bibliothèque</h2>
            <div id="bibliotheque-content">
                </div>
        </section>

        <section id="murmures" class="section">
            <h2 class="section-title">Murmures</h2>
            <div id="murmures-grid">
                </div>
        </section>

    </div>

    <script src="contenu.js"></script>
    <script>
    // 1. Gestion de la Page Unique
    function showSection(sectionId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        const target = document.getElementById(sectionId);
        if(target) target.classList.add('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 2. Particules de poussière (L'esprit du temple)
    function createDustParticles() {
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'dust';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.top = Math.random() * 100 + 'vh';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            document.body.appendChild(particle);
        }
    }

    // 3. Rendu de Murmures avec suppression de la phrase
    function renderMurmuresCleaned() {
        const grid = document.getElementById('murmures-grid');
        if(!grid || typeof DATABASE === 'undefined') return;
        
        let html = '';
        DATABASE.murmures.forEach(m => {
            // On vérifie que le contenu ne contient pas la phrase à supprimer
            let content = m.content.replace("L'art de l'alchimie intérieure est de transformer le tumulte du monde en un silence vibrant", "");
            html += `<div class="murmure-card"><p class="parchment-text">${content}</p></div>`;
        });
        grid.innerHTML = html;
    }

    // Initialisation au chargement
    window.onload = () => {
        createDustParticles();
        if(typeof renderEnseignements === 'function') renderEnseignements();
        if(typeof renderBibliotheque === 'function') renderBibliotheque();
        if(typeof renderManuel === 'function') renderManuel();
        renderMurmuresCleaned(); // Version sans la phrase
        
        // Gestion auto des ancres
        if (window.location.hash) {
            const id = window.location.hash.substring(1);
            showSection(id.split('-')[0] || id);
        }
    };
    </script>
</body>
</html>
