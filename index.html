<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Temple du Silence - AYP</title>
    <style>
        /* --- FONDATIONS IMMUABLES v2.1 --- */
        body { 
            background: #0a0a0c url('p0003.jpg') no-repeat center center fixed; 
            background-size: cover; color: #ffffff; font-family: 'Georgia', serif; margin: 0; text-align: center;
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.82); z-index: -1; }
        
        nav { background: rgba(0,0,0,0.95); padding: 15px 20px; border-bottom: 1px solid #d4af37; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-brand { color:#d4af37; font-weight:bold; letter-spacing:3px; }
        .nav-links { display: flex; align-items: center; gap: 20px; }
        .nav-links a { color: #ffffff; text-decoration: none; font-weight: bold; cursor: pointer; font-size: 0.85rem; text-transform: uppercase; }
        .lang-btn { background: none; border: 1px solid #d4af37; color: #d4af37; cursor: pointer; padding: 5px 10px; border-radius: 4px; font-weight: bold; }

        .container { 
            max-width: 900px; margin: 40px auto; padding: 45px; 
            background: rgba(10, 10, 12, 0.96); border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px; box-shadow: 0 25px 50px rgba(0,0,0,0.9); box-sizing: border-box;
        }

        /* --- EFFET DE TRANSITION DOUCE --- */
        #response-area {
            margin-top: 40px; font-style: italic; color: #d4af37; font-size: 1.25rem; 
            min-height: 180px; text-align: left; padding: 0 20px; line-height: 1.7;
            opacity: 0; transition: opacity 1.2s ease-in-out;
        }
        #response-area.visible { opacity: 1; }

        h1, h2 { color: #d4af37; letter-spacing: 2px; }
        #parable-body { text-align: justify; line-height: 1.9; font-size: 1.1rem; color: #e0e0e0; }
        
        select, input, textarea {
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px;
            border: 1px solid #333; background: #111; color: white; outline: none; box-sizing: border-box; font-family: inherit;
        }

        .btn-action {
            background: #2b57e5; color: white; border: none; padding: 18px 50px;
            border-radius: 40px; cursor: pointer; font-weight: bold; letter-spacing: 2px; text-transform: uppercase;
        }

        .signature-area { margin: 50px 0; display: flex; justify-content: center; gap: 20px; }
        .signature-area img { width: 60px; filter: drop-shadow(0 0 10px #d4af37); }
        
        footer { padding: 40px; color: #d4af37; font-size: 0.85rem; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

    <nav>
        <span class="nav-brand">CHEMIN AYP</span>
        <div class="nav-links">
            <a onclick="showSection('sage')" id="nav-sage">LE SAGE</a>
            <a onclick="showSection('parabole')" id="nav-parabole">LA PARABOLE</a>
            <a onclick="showSection('podcasts')" id="nav-podcasts">ENSEIGNEMENTS</a>
            <a onclick="showSection('contact')" id="nav-contact">CONTACT</a>
            <button class="lang-btn" onclick="setLanguage('fr')">FR</button>
            <button class="lang-btn" onclick="setLanguage('en')">EN</button>
        </div>
    </nav>

    <div class="container" id="sage">
        <h1 id="sage-title">Le Temple du Silence</h1>
        <p id="sage-sub">Définissez votre niveau de pratique pour une guidance précise.</p>
        <select id="user-level">
            <option value="aucun" id="opt-none">Aucun / Esprit Neuf</option>
            <option value="debutant" id="opt-deb">Fondation : Méditation Profonde</option>
            <option value="intermediaire" id="opt-int">Éveil : Respiration Spinale</option>
            <option value="avance" id="opt-adv">Intégration : Samyama & Kriyas</option>
        </select>
        <input type="text" id="user-question" placeholder="...">
        <br><button class="btn-action" id="sage-btn" onclick="askSage()">INTERROGER</button>
        <div id="response-area" class="visible">Le silence est la réponse qui précède toute question.</div>
    </div>

    <div class="container" id="parabole" style="display:none;">
        <h1 id="para-main-title">La Parabole</h1>
        <h2 id="para-title" style="font-style:italic;"></h2>
        <audio controls style="width:100%; margin:25px 0;"><source src="audio.mp3" type="audio/mpeg"></audio>
        <div id="parable-body"></div>
        <p id="para-quote" style="color:#d4af37; font-weight:bold; margin-top:35px;"></p>
    </div>

    <div class="signature-area">
        <img src="meditator_icon.png" alt="Signature">
        <img src="om_icon.png" alt="Signature">
    </div>

    <footer><p id="footer-text"></p></footer>

    <script>
    let isFirstQuestion = true;
    let currentLang = 'fr';

    const techWisdom = {
        fr: {
            "samyama": {
                aucun: "Le Samyama est l'art d'agir à partir du silence. Pour un esprit neuf, il est inutile de chercher à manifester quoi que ce soit si le silence n'est pas encore établi. Votre premier 'Samyama' est de rester assis, immobile, et de laisser les pensées passer comme des nuages. C'est dans ce vide que naîtra plus tard votre véritable pouvoir.",
                debutant: "Le Samyama commence lorsque le silence de la méditation devient stable. Il s'agit de laisser tomber une pensée-graine (un sutra) dans le puits sans fond de votre conscience pure. Si vous essayez trop fort, le puits se trouble. Soyez comme celui qui lâche un caillou dans l'eau : observez les rides sans interférer.",
                intermediaire: "À ce stade, le Samyama devient une force dynamique. En libérant l'intention au bon moment après votre méditation, vous commencez à aligner votre vie extérieure sur votre vérité intérieure. Utilisez l'auto-régulation : si le Samyama crée une tension mentale excessive, revenez au simple silence.",
                avance: "Le Samyama est désormais votre état naturel. L'intention et le silence ne sont plus séparés. Chaque pensée devient une onde de lumière qui réorganise le système nerveux. Vous ne pratiquez plus le Samyama, vous *êtes* le Samyama en mouvement. L'extase radiante est le fruit de cette fusion constante."
            },
            "alimentation": {
                aucun: "Le corps est le temple du silence. Pour commencer, observez simplement comment les aliments lourds, trop épicés ou industriels affectent votre clarté d'esprit après manger. Une alimentation simple est la première étape pour polir le système nerveux. Buvez de l'eau pure et honorez votre faim.",
                debutant: "Favorisez les aliments 'sattviques' (frais, légers, naturels). Ils réduisent la friction dans vos canaux énergétiques (nadis). Un système nerveux moins encombré par la digestion lourde médite plus profondément. Mais ne devenez pas fanatique ; la rigidité mentale est plus nocive qu'un repas imparfait.",
                intermediaire: "Avec la montée de la Kundalini, votre système digestif devient plus sensible. Vous pourriez avoir besoin de repas plus petits mais plus fréquents, ou de saveurs plus douces pour calmer le feu intérieur. Écoutez votre corps ; c'est lui qui dicte le régime nécessaire à votre conductivité extatique.",
                avance: "La nourriture n'est plus seulement physique, elle est prana. À ce stade, vous savez exactement ce qui soutient ou entrave l'écoulement de l'extase dans vos nerfs. Le régime idéal est celui qui maintient la transparence totale de votre instrument biologique face à la lumière divine."
            },
            "kundalini": {
                aucun: "La Kundalini est la conductivité innée du système nerveux vers l'extase... [etc]",
                debutant: "À ce stade, la Kundalini est le fruit de votre régularité... [etc]",
                intermediaire: "La Respiration Spinale transforme le nerf spinal en un conducteur de lumière... [etc]",
                avance: "L'énergie et le silence ont fusionné... [etc]"
            }
        },
        en: {
            "samyama": {
                aucun: "Samyama is the art of acting from silence. For a new mind, do not seek to manifest anything yet. Your first 'Samyama' is to remain still and let thoughts pass like clouds. Within this void, your true power will later be born.",
                debutant: "Samyama begins when meditation's silence becomes stable. It is about dropping a seed-thought (a sutra) into the bottomless well of pure consciousness. If you try too hard, the well clouds. Be like one dropping a pebble into water: watch the ripples without interfering.",
                intermediaire: "At this stage, Samyama becomes a dynamic force. By releasing intention at the right moment after meditation, you align your outer life with inner truth. Use self-pacing: if Samyama creates mental tension, return to simple silence.",
                avance: "Samyama is now your natural state. Intention and silence are no longer separate. Every thought is a wave of light reorganizing the nervous system. You no longer practice Samyama; you *are* Samyama in motion."
            },
            "diet": {
                aucun: "The body is the temple of silence. To start, simply observe how heavy, overly spicy, or processed foods affect your mental clarity. Simple eating is the first step to polishing the nervous system. Drink pure water and honor your hunger.",
                debutant: "Favor 'sattvic' foods (fresh, light, natural). They reduce friction in your energy channels (nadis). A nervous system less burdened by heavy digestion meditates deeper. Do not become fanatical; mental rigidity is more harmful than an imperfect meal.",
                intermediaire: "With Kundalini rising, your digestive system becomes more sensitive. You may need smaller, more frequent meals or milder flavors to calm the inner fire. Listen to your body; it dictates the diet needed for your ecstatic conductivity.",
                avance: "Food is no longer just physical; it is prana. You know exactly what supports or hinders the flow of ecstasy in your nerves. The ideal diet is one that maintains your biological instrument's total transparency."
            }
        }
    };

    const parable = {
        fr: {
            title: "Au-delà de la Rive — Une Parabole sur l’Appel Intérieur",
            body: `Il y a des lieux où personne n’ose plus aller... [Texte intégral de Kofi] ...Traverse. Écoute. Pratique. Le reste suivra.`,
            quote: "Traversez. Écoutez. Pratiquez. Le reste suivra."
        },
        en: {
            title: "Beyond the River — A Parable on the Inner Calling",
            body: `There are places where no one dares to go anymore... [Full English translation] ...Cross. Listen. Practice. The rest will follow.`,
            quote: "Cross. Listen. Practice. The rest will follow."
        }
    };

    function askSage() {
        const q = document.getElementById('user-question').value.toLowerCase();
        const level = document.getElementById('user-level').value;
        const area = document.getElementById('response-area');
        
        area.classList.remove('visible');
        
        setTimeout(() => {
            let response = currentLang === 'fr' 
                ? "Le silence est le terrain de jeu de l'infini. Continuez de vous asseoir chaque jour, car la régularité est le secret de l'alchimie intérieure." 
                : "Silence is the playground of the infinite. Continue to sit every day, for regularity is the secret of inner alchemy.";

            // Mots-clés pour le Samyama et l'Alimentation
            const keywords = {
                "samyama": "samyama",
                "alimentation": currentLang === 'fr' ? ["alimentation", "nourriture", "régime", "manger"] : ["diet", "food", "eating", "samyama"]
            };

            for (let topic in techWisdom[currentLang]) {
                if (q.includes(topic) || (topic === "alimentation" && ["nourriture", "régime", "manger", "diet", "food"].some(k => q.includes(k)))) {
                    response = techWisdom[currentLang][topic][level];
                    break;
                }
            }

            let prefix = "";
            if (isFirstQuestion) {
                prefix = currentLang === 'fr' ? "Bienvenue, chercheur. " : "Welcome, seeker. ";
                isFirstQuestion = false;
            } else {
                prefix = currentLang === 'fr' ? "L'instructeur enseigne : " : "The instructor teaches: ";
            }

            area.innerHTML = `<strong>${prefix}</strong><br><br>${response}`;
            area.classList.add('visible');
        }, 800);
    }

    function setLanguage(lang) {
        currentLang = lang;
        const isEn = lang === 'en';
        document.getElementById('nav-sage').textContent = isEn ? "THE SAGE" : "LE SAGE";
        document.getElementById('nav-parabole').textContent = isEn ? "THE PARABLE" : "LA PARABOLE";
        document.getElementById('nav-podcasts').textContent = isEn ? "TEACHINGS" : "ENSEIGNEMENTS";
        document.getElementById('nav-contact').textContent = isEn ? "CONTACT" : "CONTACT";
        document.getElementById('sage-title').textContent = isEn ? "The Temple of Silence" : "Le Temple du Silence";
        document.getElementById('sage-sub').textContent = isEn ? "Define your practice level for precise guidance." : "Définissez votre niveau de pratique pour une guidance précise.";
        document.getElementById('user-question').placeholder = isEn ? "Ask about Samyama, Diet, or Kundalini..." : "Interrogez sur le Samyama, l'Alimentation, la Kundalini...";
        document.getElementById('sage-btn').textContent = isEn ? "INQUIRE" : "INTERROGER";
        document.getElementById('opt-none').textContent = isEn ? "None / Fresh Mind" : "Aucun / Esprit Neuf";
        document.getElementById('para-main-title').textContent = isEn ? "The Parable" : "La Parabole";
        document.getElementById('para-title').textContent = parable[lang].title;
        document.getElementById('parable-body').innerHTML = parable[lang].body;
        document.getElementById('para-quote').textContent = parable[lang].quote;
        document.getElementById('footer-text').innerHTML = isEn ? "PROPERTY & LINEAGE 🪷 ॐ" : "PROPRIÉTÉ & LIGNÉE 🪷 ॐ";
    }

    function showSection(id) {
        document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    window.onload = () => { setLanguage('fr'); showSection('sage'); };
    </script>
</body>
</html>
