<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Temple du Silence - AYP</title>
    <style>
        /* L'ambiance visuelle immuable */
        body { 
            background: #0a0a0c url('kofi.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #ffffff; 
            font-family: 'Georgia', serif; 
            margin: 0;
            text-align: center;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.55); /* Voile pour la lisibilité */
            z-index: -1;
        }
        nav { background: rgba(0,0,0,0.85); padding: 20px; border-bottom: 1px solid #d4af37; display: flex; justify-content: space-between; align-items: center; }
        .nav-links a { color: #ffffff; text-decoration: none; margin: 0 15px; font-weight: bold; cursor: pointer; font-size: 0.9rem; letter-spacing: 1px; }
        .lang-btn { background: none; border: 1px solid #d4af37; color: #d4af37; cursor: pointer; padding: 5px 10px; margin-left: 5px; font-weight: bold; }
        
        .container { 
            max-width: 850px; 
            margin: 50px auto; 
            padding: 40px; 
            background: rgba(10, 10, 12, 0.85); 
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        h1, h2 { color: #d4af37; letter-spacing: 2px; }
        #parable-body { text-align: justify; line-height: 1.9; font-size: 1.15rem; color: #e0e0e0; }
        
        /* Le Bouton Bleu souhaité */
        #sage-btn {
            background: #2b57e5; 
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 25px;
            font-weight: bold;
            font-size: 1rem;
            letter-spacing: 1px;
            transition: transform 0.2s, background 0.3s;
        }
        #sage-btn:hover { background: #1a3fb5; transform: scale(1.05); }
        
        input { width: 80%; padding: 15px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; font-size: 1rem; text-align: center; }
        
        .signature-area { margin: 40px 0; }
        .signature-area img { width: 180px; filter: drop-shadow(0 0 8px #d4af37); }
        
        footer { padding: 40px; color: #d4af37; font-size: 0.85rem; letter-spacing: 2px; opacity: 0.8; }
    </style>
</head>
<body>

    <nav>
        <span style="color:#d4af37; font-weight:bold; letter-spacing:3px; margin-left:20px;">CHEMIN AYP</span>
        <div class="nav-links">
            <a onclick="showSection('sage')" id="nav-sage">LE SAGE AYP</a>
            <a onclick="showSection('parabole')" id="nav-parabole">LA PARABOLE</a>
            <a onclick="showSection('podcasts')" id="nav-podcasts">PODCASTS & VIDÉOS</a>
            <button class="lang-btn" onclick="setLanguage('fr')">FR</button>
            <button class="lang-btn" onclick="setLanguage('en')">EN</button>
        </div>
    </nav>

    <div class="container" id="sage">
        <h1 id="sage-title">Le Temple du Silence</h1>
        <p id="sage-sub">Confiez votre interrogation à l'Instructeur...</p>
        <input type="text" id="user-question" placeholder="...">
        <br><button id="sage-btn" onclick="askSage()">INTERROGER</button>
        <div id="response-area" style="margin-top:40px; font-style:italic; color:#d4af37; font-size:1.2rem; min-height:60px;">Présence simple, l'âme accueille.</div>
    </div>

    <div class="container" id="parabole" style="display:none;">
        <h1 id="para-main-title">La Parabole</h1>
        <h2 id="para-title" style="font-style:italic;">Au-delà de la Rive</h2>
        <audio controls style="width:100%; margin:30px 0;"><source src="audio.mp3" type="audio/mpeg"></audio>
        <div id="parable-body"></div>
        <p id="para-quote" style="color:#d4af37; font-weight:bold; margin-top:30px; font-size:1.2rem;">Traversez. Écoutez. Pratiquez. Le reste suivra.</p>
    </div>

    <div class="container" id="podcasts" style="display:none;">
        <h1 id="pod-title">Autres Podcasts</h1>
        <div id="pod-content" style="text-align:left; line-height:2.5; font-size:1.1rem; padding-left:20px;"></div>
    </div>

    <div class="signature-area">
        <img src="signature-ayp.png" alt="Signature AYP">
    </div>

    <footer>
        <p id="footer-text">PROPRIÉTÉ & LIGNÉE 🪷 | PASSANTS : <span id="count">0000</span></p>
    </footer>

    <script>
    // --- Banque de Sagesse AYP (Yogani Style) ---
    const wisdom = {
        fr: [
            "Le silence est la racine ; ne laisse pas le vent des pensées l'agiter. Assieds-toi dans le mantra.",
            "La respiration spinale est le pont d'or entre ta terre et ton ciel. Respire avec douceur.",
            "Sois le témoin immobile. Laisse passer le tumulte comme l'eau glisse sur le dos du crocodile.",
            "L'extase ne se force pas. Elle est le parfum naturel d'un système nerveux purifié.",
            "La pratique est la graine, le silence est l'arbre, et le service est le fruit qui nourrit le monde.",
            "Le mantra est un véhicule léger ; ne le charge pas de la lourdeur de la concentration.",
            "Dans le sanctuaire de ton cœur, la question et la réponse ne font qu'un."
        ],
        en: [
            "Silence is the root; do not let the wind of thoughts stir it. Rest in the mantra.",
            "Spinal breathing is the golden bridge between your earth and your sky. Breathe softly.",
            "Be the still witness. Let the turmoil pass like water off a crocodile's back.",
            "Ecstasy cannot be forced. It is the natural fragrance of a purified nervous system.",
            "Practice is the seed, silence is the tree, and service is the fruit that feeds the world.",
            "The mantra is a light vehicle; do not weigh it down with the heaviness of concentration.",
            "In the sanctuary of your heart, the question and the answer are one."
        ]
    };
    
    let currentLang = 'fr';

    function askSage() {
        const q = document.getElementById('user-question').value;
        const area = document.getElementById('response-area');
        if (!q.trim()) return;
        
        area.style.opacity = "0.5";
        area.innerHTML = currentLang === 'fr' ? "Le Sage écoute le silence..." : "The Sage listens to the silence...";
        
        setTimeout(() => {
            const list = wisdom[currentLang];
            const pick = list[Math.floor(Math.random() * list.length)];
            area.style.opacity = "1";
            area.innerHTML = `« ${pick} »`;
        }, 1500);
    }

    function showSection(id) {
        document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function setLanguage(lang) {
        currentLang = lang;
        const isEn = lang === 'en';
        
        // Navigation
        document.getElementById('nav-sage').textContent = isEn ? "THE SAGE AYP" : "LE SAGE AYP";
        document.getElementById('nav-parabole').textContent = isEn ? "THE PARABLE" : "LA PARABOLE";
        document.getElementById('nav-podcasts').textContent = isEn ? "PODCASTS & VIDEOS" : "PODCASTS & VIDÉOS";
        
        // Sage
        document.getElementById('sage-title').textContent = isEn ? "The Temple of Silence" : "Le Temple du Silence";
        document.getElementById('sage-sub').textContent = isEn ? "Entrust your question to the Instructor..." : "Confiez votre interrogation à l'Instructeur...";
        document.getElementById('sage-btn').textContent = isEn ? "ASK THE SAGE" : "INTERROGER";
        document.getElementById('response-area').innerHTML = isEn ? "Simple presence, the soul welcomes." : "Présence simple, l'âme accueille.";
        
        // Parabole Intégrale
        const frText = `Il y a des lieux où personne n’ose plus aller. Des frontières invisibles... <br><br>Dans un village reculé, au cœur de la savane, vivait un jeune homme nommé Kofi... [Texte complet inséré ici] ...Traverse. Écoute. Pratique. Le reste suivra.`;
        const enText = `There are places where no one dares to go anymore... <br><br>In a remote village lived a young man named Kofi... [Full text inserted here] ...Cross. Listen. Practice. The rest will follow.`;
        
        document.getElementById('parable-body').innerHTML = isEn ? enText : frText;
        document.getElementById('para-main-title').textContent = isEn ? "The Parable" : "La Parabole";
        document.getElementById('para-title').textContent = isEn ? "Beyond the River" : "Au-delà de la Rive";
        document.getElementById('para-quote').textContent = isEn ? "Cross. Listen. Practice. The rest will follow." : "Traversez. Écoutez. Pratiquez. Le reste suivra.";

        // Podcasts
        document.getElementById('pod-title').textContent = isEn ? "Other Podcasts" : "Autres Podcasts";
        document.getElementById('pod-content').innerHTML = isEn ? 
            "• The Path of Kriya Yoga<br>• Spinal Breathing Technique<br>• The Deep Meditation Foundation" : 
            "• Le Chemin du Kriya Yoga<br>• La Technique de Respiration Spinale<br>• Les Fondations de la Méditation Profonde";
    }

    window.onload = function() {
        setLanguage('fr');
        showSection('sage');
        let count = localStorage.getItem('visits') || 1;
        localStorage.setItem('visits', ++count);
        document.getElementById('count').textContent = count.toString().padStart(4, '0');
    };
    </script>
</body>
</html>
